# Release workflow — triggered by pushing a tag like v0.1.0.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# Builds todoforai-bridge-{linux,darwin}-{x64,arm64} + .sha256 sidecars, then creates a
# GitHub Release with those assets. The installer at
# https://todofor.ai/bridge reads `releases/latest` via the public GitHub API.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build + release (e.g. v0.1.0). Required for manual runs.'
        required: true

permissions:
  contents: write   # for gh release create / upload

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            make: release-linux-x64
          - target: linux-arm64
            os: ubuntu-latest
            make: release-linux-arm64
          - target: darwin-x64
            os: macos-latest
            make: release-darwin-x64
          - target: darwin-arm64
            os: macos-latest
            make: release-darwin-arm64
          - target: windows-x64
            os: ubuntu-latest
            make: release-windows-x64
            ext: .exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout bridge
        uses: actions/checkout@v4
        with:
          path: bridge

      # Sibling c-core (public), as expected by Makefile (-I../todoforai-c-core/...)
      - name: Checkout c-core
        uses: actions/checkout@v4
        with:
          repository: todoforai/todoforai-c-core
          path: todoforai-c-core

      - name: Install zig (linux + windows targets)
        if: startsWith(matrix.target, 'linux-') || startsWith(matrix.target, 'windows-')
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build ${{ matrix.target }}
        working-directory: bridge
        run: make ${{ matrix.make }}

      - name: Compute sha256
        working-directory: bridge/build
        env:
          ASSET: todoforai-bridge-${{ matrix.target }}${{ matrix.ext }}
        run: |
          if command -v sha256sum >/dev/null; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi
          cat "$ASSET.sha256"

      - name: Smoke test binary
        working-directory: bridge/build
        # Only run when target arch matches runner arch — otherwise the binary
        # can't execute on the CI host. Windows is cross-compiled on Linux,
        # so it's never run here.
        if: >
          (matrix.target == 'linux-x64'    && runner.arch == 'X64')   ||
          (matrix.target == 'linux-arm64'  && runner.arch == 'ARM64') ||
          (matrix.target == 'darwin-x64'   && runner.arch == 'X64')   ||
          (matrix.target == 'darwin-arm64' && runner.arch == 'ARM64')
        run: ./todoforai-bridge-${{ matrix.target }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: todoforai-bridge-${{ matrix.target }}
          path: |
            bridge/build/todoforai-bridge-${{ matrix.target }}${{ matrix.ext }}
            bridge/build/todoforai-bridge-${{ matrix.target }}${{ matrix.ext }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for gh CLI context)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -lah dist/

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # Create the release if it doesn't exist; otherwise upload into it.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "todoforai-bridge $tag" \
              --generate-notes
          fi
